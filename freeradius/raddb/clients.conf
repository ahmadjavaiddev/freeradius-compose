client localhost {
    ipaddr = 127.0.0.1
    proto = *
    secret = testing123
    limit {
        max_connections = 16
        lifetime = 0
        idle_timeout = 900
    }
}

client localhost_ipv6 {
    ipv6addr = ::1
    secret = testing123
}


client docker-host {
    ipaddr = 172.20.0.1
    secret = testing123
    shortname = docker-host
    require_message_authenticator = no
}

client docker-net {
    ipaddr = 172.20.0.0/24
    secret = testing123
    shortname = docker-net
    require_message_authenticator = no
}



client wireguard-subnet {
    ipaddr = 10.0.0.0/24
    secret = 3cf8ccfe956060159eb1722712134a6e
    shortname = wireguard-clients
    nas_type = other
}
