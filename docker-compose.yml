networks:
  radius-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24

volumes:
  db-data:


services:

  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wg
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Karachi}
      - SERVERURL=${SERVER_IP}
      - SERVERPORT=${WG_PORT:-51820}
      - PEERS=0
      - PEERDNS=auto
      - INTERNAL_SUBNET=${WG_SUBNET:-10.0.0.0/24}
      - ALLOWEDIPS=0.0.0.0/0
      - LOG_CONFS=false
    volumes:
      - ./wireguard/config:/config
      - ./wireguard/post-start.sh:/custom-cont-init.d/post-start.sh
      - /lib/modules:/lib/modules:ro
    ports:
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
      - "8002:8002"
      - "1812:1812/udp"
      - "1813:1813/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      radius-net:
        ipv4_address: 172.25.0.11
    healthcheck:
      test: [ "CMD-SHELL", "wg show wg0 | grep -q 'interface' && ip addr show wg0 | grep -q '10.0.0.1/24'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  freeradius:
    build: ./freeradius
    container_name: freeradius_app
    command: [ "freeradius", "-f" ]
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      radius-db:
        condition: service_healthy
      wireguard:
        condition: service_healthy
    environment:
      - DB_HOST=172.25.0.10
      - DB_PASS=${DB_PASS}
      - RADIUS_SECRET=${RADIUS_SECRET}
    healthcheck:
      test: [ "CMD-SHELL", "echo 'User-Name = \"test\"' | radclient -x 127.0.0.1:1812 auth ${RADIUS_SECRET} 2>&1 | grep -q 'Access'" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  radius-db:
    image: postgres:16-alpine
    container_name: freeradius_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-radius}
      POSTGRES_USER: ${DB_USER:-radius}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      radius-net:
        ipv4_address: 172.25.0.10
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-radius} -d ${DB_NAME:-radius}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    image: ${APP_IMAGE:-ghcr.io/ahmadjavaiddev/command-portal-backend:latest}
    container_name: isp_app
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    network_mode: "service:wireguard"
    depends_on:
      radius-db:
        condition: service_healthy
      wireguard:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=8002
      - DATABASE_URL=postgresql://${DB_USER:-radius}:${DB_PASS}@172.25.0.10:5432/${DB_NAME:-radius}?schema=public
      - DB_PASSWORD=${DB_PASS}
      - SERVER_ENDPOINT=${SERVER_IP}:${WG_PORT:-51820}
      - WG_CONFIG_PATH=/config/wg_confs/wg0.conf
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - RADIUS_SECRET=${RADIUS_SECRET}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
    volumes:
      - ./wireguard/config:/config
      - /var/run/docker.sock:/var/run/docker.sock

  backups:
    image: offen/docker-volume-backup:latest
    container_name: wisp_full_backup
    restart: unless-stopped
    depends_on:
      radius-db:
        condition: service_healthy
    volumes:
      # We mount the folders we want to protect
      - ./wireguard/config:/backup/wireguard_keys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ:-Asia/Karachi}
      # 1. Database Connection (It will run pg_dump for you)
      - BACKUP_FILENAME=wisp-full-backup-%Y-%m-%dT%H-%M-%S.tar.gz
      - BACKUP_DATABASE_URL=postgres://${DB_USER:-radius}:${DB_PASS}@172.25.0.10:5432/${DB_NAME:-radius}

      # 2. Schedule (Every 6 hours)
      - BACKUP_CRON_EXPRESSION=0 */6 * * *
     
      # # Cloudflare R2 Credentials
      - AWS_S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_KEY}
      - AWS_REGION=auto
      
      # # THE MAGIC FIX: Offen's exact variables
      - AWS_ENDPOINT=${S3_ENDPOINT}
      - AWS_ENDPOINT_PROTO=https
